# Keep your local settings but allow Render to override them
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${JDBC_DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${JDBC_DATABASE_USERNAME:sa}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Automatically create tables based on your Java Entity files
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true